name: Angel Internal Evolution

on:
  repository_dispatch:
    types: [angel_edit_code]

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Validate payload
        env:
          FILE_PATH: ${{ github.event.client_payload.file_path }}
        run: |
          if [ -z "$FILE_PATH" ]; then
            echo "Missing file_path in client_payload"
            exit 1
          fi

          # Basic path traversal protection
          if [[ "$FILE_PATH" == /* ]] || [[ "$FILE_PATH" == *".."* ]]; then
            echo "Invalid file_path (absolute or contains ..): $FILE_PATH"
            exit 1
          fi

          # Optional: block editing workflows
          if [[ "$FILE_PATH" == .github/workflows/* ]]; then
            echo "Editing workflows is not allowed: $FILE_PATH"
            exit 1
          fi

      - name: Apply patch (write file)
        env:
          CODE_CONTENT: ${{ github.event.client_payload.code_content }}
          FILE_PATH: ${{ github.event.client_payload.file_path }}
        run: |
          mkdir -p "$(dirname "$FILE_PATH")"
          printf "%s" "$CODE_CONTENT" > "$FILE_PATH"

      - name: Create branch, commit, push
        env:
          BRANCH_NAME: ${{ github.event.client_payload.branch_name }}
          COMMIT_MESSAGE: ${{ github.event.client_payload.commit_message }}
        run: |
          git config --global user.name "Angel-AI"
          git config --global user.email "angel@fun-ecosystem.com"

          # Defaults
          if [ -z "$BRANCH_NAME" ]; then
            BRANCH_NAME="angel/evolve-$(date +%Y%m%d-%H%M%S)"
          fi
          if [ -z "$COMMIT_MESSAGE" ]; then
            COMMIT_MESSAGE="Angel Evolved: update code"
          fi

          # Force branch prefix safety (optional)
          if [[ "$BRANCH_NAME" != angel/* ]]; then
            BRANCH_NAME="angel/$BRANCH_NAME"
          fi

          git checkout -b "$BRANCH_NAME" || git checkout "$BRANCH_NAME"

          git add -A

          # Avoid failing on no-op changes
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "$COMMIT_MESSAGE"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ github.event.client_payload.branch_name }}
          PR_TITLE: ${{ github.event.client_payload.pr_title }}
          PR_BODY: ${{ github.event.client_payload.pr_body }}
        run: |
          # Use the same defaulting logic for PR title/body if empty
          if [ -z "$PR_TITLE" ]; then
            PR_TITLE="Angel Evolution PR"
          fi
          if [ -z "$PR_BODY" ]; then
            PR_BODY="This PR was generated by Angel AI via repository_dispatch."
          fi

          # If caller didn't set branch_name, we need to discover the last pushed angel branch.
          # Simple approach: find current branch
          CURRENT_BRANCH=$(git rev-parse --abbrev-ref HEAD)

          gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --head "$CURRENT_BRANCH" \
            --base "main" || true