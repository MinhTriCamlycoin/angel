name: Angel Internal Evolution
on:
  repository_dispatch:
    types: [angel_edit_code]

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Angel Edit Process
        env:
          CODE_CONTENT: ${{ github.event.client_payload.code_content }}
          FILE_PATH: ${{ github.event.client_payload.file_path }}
        run: |
          mkdir -p $(dirname "$FILE_PATH")
          printf "%s" "$CODE_CONTENT" > "$FILE_PATH"

      - name: Create or Update Branch
        run: |
          git config --global user.name "Angel-AI"
          git config --global user.email "angel@fun-ecosystem.com"
          BRANCH_NAME="${{ github.event.client_payload.branch_name }}"
          git checkout -B $BRANCH_NAME
          git add .
          git commit -m "Angel Evolved: ${{ github.event.client_payload.commit_message }}"
          git push origin $BRANCH_NAME --force