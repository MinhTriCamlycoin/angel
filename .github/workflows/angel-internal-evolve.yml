name: Angel Internal Evolution

on:
  repository_dispatch:
    types: [angel_edit_code]

jobs:
  evolve:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate payload
        env:
          FILE_PATH: ${{ github.event.client_payload.file_path }}
          BRANCH_NAME: ${{ github.event.client_payload.branch_name }}
        run: |
          if [ -z "$FILE_PATH" ]; then
            echo "Missing file_path"
            exit 1
          fi

          if [[ "$FILE_PATH" == /* ]] || [[ "$FILE_PATH" == *".."* ]]; then
            echo "Invalid file_path: $FILE_PATH"
            exit 1
          fi

          if [[ "$FILE_PATH" == .github/workflows/* ]]; then
            echo "Editing workflows is not allowed: $FILE_PATH"
            exit 1
          fi

          if [ -z "$BRANCH_NAME" ]; then
            echo "Missing branch_name"
            exit 1
          fi

          if [[ "$BRANCH_NAME" != angel/* ]]; then
            echo "branch_name must start with angel/: $BRANCH_NAME"
            exit 1
          fi

      - name: Apply patch (write file)
        env:
          CODE_CONTENT: ${{ github.event.client_payload.code_content }}
          FILE_PATH: ${{ github.event.client_payload.file_path }}
        run: |
          mkdir -p "$(dirname "$FILE_PATH")"
          printf "%s" "$CODE_CONTENT" > "$FILE_PATH"

      - name: Commit and push branch
        env:
          BRANCH_NAME: ${{ github.event.client_payload.branch_name }}
          COMMIT_MESSAGE: ${{ github.event.client_payload.commit_message }}
        run: |
          git config user.name "Angel-AI"
          git config user.email "angel@fun-ecosystem.com"

          if [ -z "$COMMIT_MESSAGE" ]; then
            COMMIT_MESSAGE="Angel: evolve workspace"
          fi

          git checkout -b "$BRANCH_NAME"

          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "$COMMIT_MESSAGE"
          git push origin "$BRANCH_NAME"

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ github.event.client_payload.pr_title }}
          PR_BODY: ${{ github.event.client_payload.pr_body }}
        run: |
          if [ -z "$PR_TITLE" ]; then
            PR_TITLE="Angel Evolution PR"
          fi
          if [ -z "$PR_BODY" ]; then
            PR_BODY="Auto-generated by Angel via repository_dispatch."
          fi

          gh pr create \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --head "$(git rev-parse --abbrev-ref HEAD)" \
            --base "main" || true
